<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bonheur+Royale&family=Yuji+Boku&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" />
  <title>HumIt — Profile</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/profile.css" />
</head>
<body>
  <nav>
    <h1 id="brand">HumiT</h1>
    <ul>
      <li><img class="modetoggle" id="modetoggle" src="/images/light.png"></li>
      <li><a href="/">Home</a></li>
      <li><a href="/profile">Profile</a></li>
      <li><a href="/trending">Trending</a></li>
      <li id="auth-link"></li>
    </ul>
  </nav>

  <div class="profile-page">

    <!-- ── HERO ── -->
    <div class="profile-hero" data-letter="✦">
      <div class="profile-hero-inner">
        <div class="avatar-ring" id="avatarInitial">?</div>
        <div class="profile-text">
          <p class="welcome-label">Welcome back</p>
          <h1 class="profile-username" id="profileUsername"></h1>
          <div class="profile-stats">
            <div class="stat-pill">
              <span class="stat-num" id="statPlaylists">—</span>
              <span class="stat-label">Playlists</span>
            </div>
            <div class="stat-pill">
              <span class="stat-num" id="statLiked">—</span>
              <span class="stat-label">Liked</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- ── ABOUT BAR ── -->
    <div class="profile-about-bar">
      <div class="about-label-block">
        <span>About me</span>
        <button id="aboutBtn">✎</button>
      </div>
      <textarea id="aboutInput" disabled placeholder="Tell people about yourself…"></textarea>
    </div>

    <!-- ── LIBRARY ── -->
    <div class="library-section">

      <div class="section-heading">
        <div class="red-bar"></div>
        <h2>Library</h2>
      </div>

      <!-- Playlists -->
      <div class="library-block">
        <div class="playlist-section-top">
          <p class="sub-heading">Playlists</p>
          <button id="createPlaylistBtn">+ New</button>
        </div>
        <div id="createPlaylistForm" style="display:none;">
          <input id="newPlaylistName" type="text" placeholder="Playlist name…" maxlength="40" autocomplete="off" />
          <button id="confirmCreateBtn">✔</button>
          <button id="cancelCreateBtn">✕</button>
        </div>
        <div id="playlistCards"></div>
      </div>

      <!-- Liked Songs -->
      <div class="library-block">
        <p class="sub-heading">Liked Songs</p>
        <div id="likedCards"></div>
      </div>

      <!-- Recognition History -->
      <div class="library-block">
        <div class="history-section-top">
          <p class="sub-heading">Recognition History</p>
          <button id="clearHistoryBtn">✕ Clear all</button>
        </div>
        <div id="historyCards"></div>
      </div>

    </div>
  </div>

  <div id="musiceffect"></div>
  <!-- <script src="/js/musiceffect.js" defer></script> -->
  <script src="/js/main.js" defer></script>
  <script src="/js/profile.js" defer></script>
</body>
</html>
